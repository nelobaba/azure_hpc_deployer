name: Deploy
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
jobs:
  terraform_deploy:
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: Ensure 'id-token: write' is ABSENT from here.
      # We are explicitly avoiding OIDC, so this permission is not needed
      # and could potentially cause issues if left in.
      contents: read # Keep this for actions/checkout
    environment: ${{ inputs.action }} # Use environment to apply protection rules and secrets
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Manual Azure CLI Login
        run: |
          echo "Attempting manual Azure CLI login using Service Principal..."
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --output none # Suppress output for security
          echo "Azure CLI login successful. Setting subscription..."
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "Subscription set."
        env:
          # Optionally, you can pass them as explicit env vars for clarity,
          # though direct use in the run command is also fine.
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform Init
        id: init
        run: |
          cd terraform
          terraform init -backend-config="resource_group_name=hpc_deployer" -backend-config="storage_account_name=hpcdeployertfstate" -backend-config="container_name=tfstate" -backend-config="key=terraform.tfstate"
      - name: Execute terraform action
        id: run_action
        run: |
          case "${{ github.event.inputs.action }}" in
            plan)
              cd terraform
              terraform plan -var="admin_password=${{ secrets.ADMIN_PASSWORD }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
              ;;
            apply)
              cd terraform
              terraform apply -auto-approve
              ;;
            destroy)
              cd terraform
              terraform destroy -auto-approve
              ;;
            *)
              echo "Unknown environment"
              exit 1
              ;;
          esac